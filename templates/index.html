{% extends "base.html" %}

{% block content %}

<table>
<tr>
    <th>Номер</th>
    <th>Название</th>
    <th>Цена</th>
</tr>
{% for stone in stones %}
<tr>
    <td>{{ stone.collection_number }}</td>
    <td>
        <a href="/stone/{{ stone.id }}">
            {{ stone.sample_name }}
        </a>
    </td>
    <td>{{ stone.estimated_price }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
